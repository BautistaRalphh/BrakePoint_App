{% extends 'BrakePoint/base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="dashboard-header">
        <input id="dashboard-search" type="text" placeholder="Search locations..." class="dashboard-search" />
        <a href="{% url 'examine' %}" class="btn-new">New</a>
    </div>

    <ul id="locations-list" class="locations-list">
        <li class="empty-state">Loading...</li>
    </ul>
</div>

<template id="location-item-template">
    <li class="location-item" data-location-id="">
        <a href="#" class="location-name"></a>
        <button class="btn btn-edit">Edit</button>
        <button class="btn btn-relocate">Relocate</button>
        <button class="btn btn-delete">Delete</button>
    </li>
</template>

<template id="location-edit-template">
    <li class="location-item editing" data-location-id="">
        <input type="text" class="edit-input" />
        <button class="btn btn-save">Save</button>
        <button class="btn btn-cancel">Cancel</button>
    </li>
</template>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    localStorage.removeItem('relocateLocationId');
    const csrfToken = '{{ csrf_token }}';
    const locationsList = document.getElementById('locations-list');
    const itemTemplate = document.getElementById('location-item-template');
    const editTemplate = document.getElementById('location-edit-template');

    function loadSavedLocations() {
        fetch('/brakepoint/api/saved-locations/')
            .then(r => r.json())
            .then(data => {
                if (data.locations) {
                    renderSavedLocations(data.locations);
                }
            })
            .catch(err => {
                console.error('Failed to load saved locations:', err);
                locationsList.innerHTML = '<li class="empty-state">Failed to load saved locations.</li>';
            });
    }

    function renderSavedLocations(list) {
        locationsList.innerHTML = '';
        if (!list || !list.length) {
            locationsList.innerHTML = '<li class="empty-state">No saved locations.</li>';
            return;
        }

        list.forEach(loc => {
            const clone = itemTemplate.content.cloneNode(true);
            const li = clone.querySelector('.location-item');
            const nameLink = clone.querySelector('.location-name');
            const editBtn = clone.querySelector('.btn-edit');
            const relocateBtn = clone.querySelector('.btn-relocate');
            const deleteBtn = clone.querySelector('.btn-delete');

            li.dataset.locationId = loc.id;
            nameLink.textContent = loc.name;
            nameLink.addEventListener('click', (e) => {
                e.preventDefault();
                navigateToLocation(loc);
            });

            editBtn.addEventListener('click', () => showEditForm(loc));
            relocateBtn.addEventListener('click', () => relocateLocation(loc));
            deleteBtn.addEventListener('click', () => deleteLocation(loc.id));

            locationsList.appendChild(clone);
        });
    }

    function navigateToLocation(loc) {
        localStorage.setItem('focusLocation', JSON.stringify({
            lat: loc.lat,
            lng: loc.lng,
            zoom: loc.zoom || 17,
            bearing: loc.bearing || 0,
            pitch: loc.pitch || 0
        }));
        window.location.href = '{% url "examine" %}';
    }

    function showEditForm(loc) {
        const existingItem = locationsList.querySelector(`[data-location-id="${loc.id}"]`);
        if (!existingItem) return;

        const clone = editTemplate.content.cloneNode(true);
        const li = clone.querySelector('.location-item');
        const input = clone.querySelector('.edit-input');
        const saveBtn = clone.querySelector('.btn-save');
        const cancelBtn = clone.querySelector('.btn-cancel');

        li.dataset.locationId = loc.id;
        input.value = loc.name;

        saveBtn.addEventListener('click', () => {
            const newName = input.value.trim();
            if (!newName) {
                alert('Name cannot be empty');
                return;
            }
            updateLocationName(loc.id, newName);
        });

        cancelBtn.addEventListener('click', () => loadSavedLocations());

        existingItem.replaceWith(li);
        input.focus();
    }

    function relocateLocation(loc) {
        localStorage.setItem('relocateLocationId', loc.id);
        localStorage.setItem('focusLocation', JSON.stringify({
            lat: loc.lat,
            lng: loc.lng,
            zoom: loc.zoom || 17,
            bearing: loc.bearing || 0,
            pitch: loc.pitch || 0
        }));
        window.location.href = '{% url "examine" %}';
    }

    function updateLocationName(id, newName) {
        fetch(`/brakepoint/api/saved-locations/${id}/`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({ name: newName })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                loadSavedLocations();
            } else {
                alert('Failed to update: ' + (data.error || 'Unknown error'));
            }
        })
        .catch(err => {
            console.error('Update error:', err);
            alert('Failed to update location. Please try again.');
        });
    }

    function deleteLocation(id) {
        if (!confirm('Are you sure you want to delete this location?')) return;

        fetch(`/brakepoint/api/saved-locations/${id}/`, {
            method: 'DELETE',
            headers: {
                'X-CSRFToken': csrfToken
            }
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                loadSavedLocations();
            } else {
                alert('Failed to delete: ' + (data.error || 'Unknown error'));
            }
        })
        .catch(err => {
            console.error('Delete error:', err);
            alert('Failed to delete location. Please try again.');
        });
    }

    loadSavedLocations();
});
</script>
{% endblock %}
