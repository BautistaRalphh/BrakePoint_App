<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrakePoint - {% block title %}{% endblock %}</title>
    
    <!-- MapLibre GL CSS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    
    <!-- Leaflet Search Plugin CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.8.0/dist/geosearch.css" />
    
    <style>
        html, body {
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }
        
        /* Default container for pages */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: 100%;
            margin: 2rem auto;
        }
        
        /* Default layout for login/signup pages */
        .container.center {
            max-width: 400px;
            margin-top: 10vh;
        }
        
        /* Full width layout for dashboard */
        .container.full-width {
            max-width: 1200px;
            margin: 1rem auto;
        }

        /* Full screen layout */
        :root {
            --header-h: 15vh;
        }

        .container.full-screen {
            width: 100vw;
            height: 100vh;
            padding: 0;
            margin: 0;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
            overflow: hidden;
            position: relative;
        }

        .container.full-screen > h1 {
            display: none;
            margin: 0;
            padding: 0;
            height: 0;
            overflow: hidden;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .messages {
            margin-bottom: 1rem;
        }
        .alert {
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 0.5rem;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .text-center {
            text-align: center;
        }
        .link {
            color: #007bff;
            text-decoration: none;
            margin-top: 1rem;
            display: block;
        }
        .link:hover {
            text-decoration: underline;
        }
        h1 {
            color: #333;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        /* Map specific styles */
        #map {
            width: 100%;
            height: calc(100vh - var(--header-h));
            border-radius: 0;
            border: 0;
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            top: var(--header-h);
            z-index: 0;
            transition: all 0.3s ease;
        }

        /* Map adjustment for select mode */
        .container.full-screen .fs-header.select-mode ~ #map {
            top: 0;
            height: 100vh;
        }

        /* Dashboard header and controls */
        .container.full-screen .fs-header {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            height: auto;
            overflow: visible;
            width: min(920px, 95%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(255,255,255,0.9));
            padding: 0.75rem 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Select mode styles */
        .container.full-screen .fs-header.select-mode {
            top: 8px;
            left: 8px;
            transform: none;
            width: 280px;
            padding: 0.4rem 0.6rem;
            background: rgba(255,255,255,0.85);
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            backdrop-filter: blur(4px);
        }

        .container.full-screen .fs-header.select-mode .header-title {
            display: none;
        }

        .container.full-screen .fs-header.select-mode .search-container {
            width: 100%;
        }

        .container.full-screen .fs-header.select-mode .controls {
            width: 100%;
        }

        .container.full-screen .fs-header.select-mode .controls #search-input {
            padding: 0.4rem;
            font-size: 0.9rem;
        }

        /* Back button styles */
        .back-button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.4rem 0.6rem;
            border-radius: 3px;
            color: #666;
            transition: background-color 0.2s;
            margin-right: 0.5rem;
        }

        .back-button:hover {
            background-color: rgba(0,0,0,0.1);
            color: #333;
        }

        .container.full-screen .fs-header.select-mode .back-button {
            display: inline-block;
        }

        /* Edit mode button styles */
        .edit-btn {
            display: block;
            width: 100%;
            margin-bottom: 6px;
            padding: 8px 12px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            color: #495057;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }

        /* Toolbar styles */
        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
        }

        .toolbar #search-input {
            flex: 1;
            min-width: 120px;
        }

        .edit-mode-button {
            background: #ffffff;
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 4px;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        .edit-mode-button:hover {
            background: #ffffff;
        }

        /* Inline edit button styles */
        .edit-btn-inline {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            color: #495057;
            transition: all 0.2s;
            padding: 0.4rem 0.8rem;
            margin: 0 2px;
            min-width: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn-inline:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }

        #edit-controls {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .container.full-screen .fs-header .header-title {
            width: 100%;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: #222;
            line-height: 1;
        }

        .container.full-screen .fs-header .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .container.full-screen .fs-header .controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: nowrap;
            width: 100%;
        }

        .container.full-screen .fs-header .controls #search-input {
            width: 100%;
            min-width: 120px;
            padding: 0.5rem;
            box-sizing: border-box;
        }

        .container.full-screen .fs-header .controls .btn,
        .container.full-screen .fs-header .controls #search-btn {
            margin-top: 0;
            padding: 0.5rem 0.75rem;
            height: auto;
            box-sizing: border-box;
        }

        /* Search suggestions dropdown */
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-top: none;
            border-radius: 0 0 5px 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 9999;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            line-height: 1.4;
            background: white;
            min-height: 40px;
        }

        .suggestion-item:hover {
            background-color: #f0f0f0;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-main {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .suggestion-details {
            color: #666;
            font-size: 12px;
        }
        
        
        @media (max-width: 768px) {
            .container.full-width {
                margin: 0.5rem;
                width: calc(100% - 1rem);
            }
        }

        /* Dashboard specific styles */
        .dashboard-container {
            padding: 2rem;
        }
        .dashboard-header {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .dashboard-search {
            flex: 1;
            padding: 0.6rem;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .btn-new {
            padding: 0.6rem 1rem;
            background: #1976d2;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
        }
        .locations-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .location-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            display: flex;
            gap: 1rem;
            align-items: center;
            background: #fafafa;
        }
        .location-item.editing {
            background: #fff3e0;
        }
        .location-name {
            flex: 1;
            color: #1976d2;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .location-name:hover {
            text-decoration: underline;
        }
        .edit-input {
            flex: 1;
            padding: 0.4rem;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .btn-edit { background: #ff9800; color: #fff; }
        .btn-relocate { background: #2196F3; color: #fff; }
        .btn-delete { background: #f44336; color: #fff; }
        .btn-save { background: #4CAF50; color: #fff; }
        .btn-cancel { background: #999; color: #fff; }
        .btn:hover { opacity: 0.9; }
        .btn {
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .empty-state {
            color: #666;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container {% block container_class %}center{% endblock %}">
        <h1>{% block heading %}BrakePoint{% endblock %}</h1>
        
        <!-- Display messages -->
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>
    
    <!-- MapLibre GL JavaScript -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    
    <!-- Leaflet Search Plugin JavaScript -->
    <script src="https://unpkg.com/leaflet-geosearch@3.8.0/dist/geosearch.umd.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
