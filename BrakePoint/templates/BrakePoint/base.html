<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrakePoint - {% block title %}{% endblock %}</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Leaflet Search Plugin CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.8.0/dist/geosearch.css" />
    
    <style>
        html, body {
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }
        
        /* Default container for pages */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: 100%;
            margin: 2rem auto;
        }
        
        /* Default layout for login/signup pages */
        .container.center {
            max-width: 400px;
            margin-top: 10vh;
        }
        
        /* Full width layout for dashboard */
        .container.full-width {
            max-width: 1200px;
            margin: 1rem auto;
        }

        /* Full screen layout */
        :root {
            --header-h: 15vh;
        }

        .container.full-screen {
            width: 100vw;
            height: 100vh;
            padding: 0;
            margin: 0;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
            overflow: hidden;
            position: relative;
        }

        .container.full-screen > h1 {
            display: none;
            margin: 0;
            padding: 0;
            height: 0;
            overflow: hidden;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .messages {
            margin-bottom: 1rem;
        }
        .alert {
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 0.5rem;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .text-center {
            text-align: center;
        }
        .link {
            color: #007bff;
            text-decoration: none;
            margin-top: 1rem;
            display: block;
        }
        .link:hover {
            text-decoration: underline;
        }
        h1 {
            color: #333;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        /* Map specific styles */
        #map {
            width: 100%;
            height: calc(100vh - var(--header-h));
            border-radius: 0;
            border: 0;
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            top: var(--header-h);
            z-index: 0;
        }

        /* Dashboard header and controls */
        .container.full-screen .fs-header {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            height: auto;
            overflow: hidden;
            width: min(920px, 95%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(255,255,255,0.9));
            padding: 0.75rem 1rem;
            box-sizing: border-box;
        }

        .container.full-screen .fs-header .header-title {
            width: 100%;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: #222;
            line-height: 1;
        }

        .container.full-screen .fs-header .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .container.full-screen .fs-header .controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: nowrap;
            width: 100%;
        }

        .container.full-screen .fs-header .controls #search-input {
            width: 100%;
            min-width: 120px;
            padding: 0.5rem;
            box-sizing: border-box;
        }

        .container.full-screen .fs-header .controls .btn,
        .container.full-screen .fs-header {
            margin-top: 0;
            padding: 0.5rem 0.75rem;
            height: auto;
            box-sizing: border-box;
        }
        
        
        @media (max-width: 768px) {
            .container.full-width {
                margin: 0.5rem;
                width: calc(100% - 1rem);
            }
        }
    </style>
</head>
<body>
    <div class="container {% block container_class %}center{% endblock %}">
        <h1>{% block heading %}BrakePoint{% endblock %}</h1>
        
        <!-- Display messages -->
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>
    
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Leaflet Search Plugin JavaScript -->
    <script src="https://unpkg.com/leaflet-geosearch@3.8.0/dist/geosearch.umd.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
