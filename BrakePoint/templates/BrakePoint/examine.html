{% extends 'BrakePoint/base.html' %}
{% load static %}

{% block title %}Dashboard{% endblock %}

{% block container_class %}full-screen{% endblock %}

{% block heading %}BrakePoint{% endblock %}

{% block content %}
    <div class="fs-header">
        <div class="header-title">What area do you want to monitor?</div>
        <div class="search-container">
            <div class="controls">
                <button id="back-btn" class="back-button" style="display: none;">←</button>
                
                <!-- Select mode toolbar (visible in normal and select mode) -->
                <div id="select-toolbar" class="toolbar">
                    <input type="text" id="search-input" placeholder="Search for a place...">
                    <button id="edit-mode-btn" class="edit-mode-button" style="display: none;">Edit</button>
                </div>
                
                <!-- Edit mode toolbar (hidden by default) -->
                <div id="edit-toolbar" class="toolbar" style="display: none;">
                    <button id="add-camera-btn" class="edit-btn-inline">+</button>
                    <button id="remove-camera-btn" class="edit-btn-inline">-</button>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    /* =========================
       MAP INITIALIZATION
       ========================= */
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: [120.9842, 14.5995], 
        zoom: 10,
        pitch: 45, 
        bearing: 0, 
        antialias: true 
    });

    map.addControl(new maplibregl.NavigationControl({
        visualizePitch: true 
    }), 'bottom-right');

    map.on('load', function() {
        const layers = map.getStyle().layers;
        let firstSymbolId;
        for (const layer of layers) {
            if (layer.type === 'symbol') {
                firstSymbolId = layer.id;
                break;
            }
        }

        map.addLayer({
            'id': '3d-buildings',
            'source': 'openmaptiles',
            'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'],
            'type': 'fill-extrusion',
            'minzoom': 15,
            'paint': {
                'fill-extrusion-color': '#aaa',
                'fill-extrusion-height': [
                    'interpolate', ['linear'], ['zoom'],
                    15, 0,
                    15.05, ['get', 'render_height']
                ],
                'fill-extrusion-base': [
                    'interpolate', ['linear'], ['zoom'],
                    15, 0,
                    15.05, ['get', 'render_min_height']
                ],
                'fill-extrusion-opacity': 0.6
            }
        }, firstSymbolId);

        loadCamerasFromStorage();
    });

    /* =========================
       STATE
       ========================= */
    let isSelectMode = false;
    let isEditMode = false;
    let isAddingCamera = false;
    let isRemovingCamera = false;
    let isSelecting = false;

    let mapCameras = [];
    let cameraIdCounter = 0;

    /* =========================
       UI ELEMENTS
       ========================= */
    const searchInput = document.getElementById('search-input');
    const backBtn = document.getElementById('back-btn');
    const selectToolbar = document.getElementById('select-toolbar');
    const editToolbar = document.getElementById('edit-toolbar');
    const editModeBtn = document.getElementById('edit-mode-btn');
    const addCameraBtn = document.getElementById('add-camera-btn');
    const removeCameraBtn = document.getElementById('remove-camera-btn');

    const suggestionsContainer = document.createElement('div');
    suggestionsContainer.className = 'search-suggestions';
    suggestionsContainer.id = 'search-suggestions';

    if (searchInput) {
        const wrap = document.createElement('div');
        wrap.style.position = 'relative';
        wrap.style.width = '100%';
        const parent = searchInput.parentNode;
        parent.insertBefore(wrap, searchInput);
        wrap.appendChild(searchInput);
        wrap.appendChild(suggestionsContainer);
    }

    let debounceTimer = null;
    let currentSuggestions = [];

    /* =========================
       MODE MANAGEMENT
       ========================= */
    function enterSelectMode() {
        if (isSelectMode) return;
        isSelectMode = true;
        document.querySelector('.fs-header')?.classList.add('select-mode');

        if (backBtn) backBtn.style.display = 'inline-block';
        if (editModeBtn) editModeBtn.style.display = 'inline-block';
        if (selectToolbar) selectToolbar.style.display = 'flex';
        if (editToolbar) editToolbar.style.display = 'none';

        const mapEl = document.getElementById('map');
        if (mapEl) {
            mapEl.style.top = '0';
            mapEl.style.height = '100vh';
            setTimeout(() => map.resize(), 100);
        }
    }

    function exitSelectMode() {
        if (!isSelectMode) return;
        if (isEditMode) exitEditMode();

        isSelectMode = false;
        document.querySelector('.fs-header')?.classList.remove('select-mode');

        if (backBtn) backBtn.style.display = 'none';
        if (editModeBtn) editModeBtn.style.display = 'none';
        if (selectToolbar) selectToolbar.style.display = 'flex';
        if (editToolbar) editToolbar.style.display = 'none';

        const mapEl = document.getElementById('map');
        if (mapEl) {
            mapEl.style.top = 'var(--header-h)';
            mapEl.style.height = 'calc(100vh - var(--header-h))';
            setTimeout(() => map.resize(), 100);
        }

        if (searchInput) searchInput.value = '';
    }

    function enterEditMode() {
        if (!isSelectMode || isEditMode) return;
        isEditMode = true;
        if (selectToolbar) selectToolbar.style.display = 'none';
        if (editToolbar) editToolbar.style.display = 'flex';
    }

    function exitEditMode() {
        if (!isEditMode) return;
        isEditMode = false;
        stopAddingCamera();
        stopRemovingCamera();
        if (selectToolbar) selectToolbar.style.display = 'flex';
        if (editToolbar) editToolbar.style.display = 'none';
        map.off('click', onMapClickAddCamera);
        map.off('click', onMapClickRemoveCamera);
        map.getCanvas().style.cursor = '';
    }

    /* =========================
       CAMERA MANAGEMENT
       ========================= */
    function addCamera(lat, lng) {
        const id = cameraIdCounter++;
        
        const el = document.createElement('div');
        el.className = 'camera-marker';
        el.style.width = '16px';
        el.style.height = '16px';
        el.style.borderRadius = '50%';
        el.style.backgroundColor = '#2196F3';
        el.style.border = '1px solid #000';
        el.style.cursor = 'pointer';

        const marker = new maplibregl.Marker({ element: el })
            .setLngLat([lng, lat])
            .addTo(map);

        el.addEventListener('click', function (e) {
            e.stopPropagation();
            if (isRemovingCamera) removeCamera(id);
            else console.log(`Camera ${id} clicked - no functionality yet`);
        });

        mapCameras.push({ id, marker, lat, lng });
        saveCamerasToStorage();
    }

    function addCameraFromData(lat, lng, id) {

        const el = document.createElement('div');
        el.className = 'camera-marker';
        el.style.width = '16px';
        el.style.height = '16px';
        el.style.borderRadius = '50%';
        el.style.backgroundColor = '#2196F3';
        el.style.border = '1px solid #000';
        el.style.cursor = 'pointer';

        const marker = new maplibregl.Marker({ element: el })
            .setLngLat([lng, lat])
            .addTo(map);

        el.addEventListener('click', function (e) {
            e.stopPropagation();
            if (isRemovingCamera) removeCamera(id);
            else console.log(`Camera ${id} clicked - no functionality yet`);
        });

        mapCameras.push({ id, marker, lat, lng });
    }

    function removeCamera(cameraId) {
        const idx = mapCameras.findIndex(c => c.id === cameraId);
        if (idx === -1) return;
        mapCameras[idx].marker.remove();
        mapCameras.splice(idx, 1);
        saveCamerasToStorage();
    }

    function saveCamerasToStorage() {
        const data = mapCameras.map(c => ({ id: c.id, lat: c.lat, lng: c.lng }));
        localStorage.setItem('mapCameras', JSON.stringify(data));
    }

    function loadCamerasFromStorage() {
        const saved = localStorage.getItem('mapCameras');
        if (!saved) return;
        try {
            const data = JSON.parse(saved);
            data.forEach(d => addCameraFromData(d.lat, d.lng, d.id));
            if (data.length) cameraIdCounter = Math.max(...data.map(c => c.id)) + 1;
        } catch (err) {
            console.error('Failed to load cameras from storage', err);
        }
    }

    /* =========================
       CAMERA ADD/REMOVE MODE HELPERS
       ========================= */
    function startAddingCamera() {
        isAddingCamera = true;
        isRemovingCamera = false;
        updateButtonStates();
        map.getCanvas().style.cursor = 'crosshair';
        map.off('click', onMapClickRemoveCamera);
        map.on('click', onMapClickAddCamera);
    }
    function stopAddingCamera() {
        isAddingCamera = false;
        updateButtonStates();
        map.getCanvas().style.cursor = '';
        map.off('click', onMapClickAddCamera);
    }
    function startRemovingCamera() {
        isRemovingCamera = true;
        isAddingCamera = false;
        updateButtonStates();
        map.getCanvas().style.cursor = 'pointer';
        map.off('click', onMapClickAddCamera);
        map.on('click', onMapClickRemoveCamera);
    }
    function stopRemovingCamera() {
        isRemovingCamera = false;
        updateButtonStates();
        map.getCanvas().style.cursor = '';
        map.off('click', onMapClickRemoveCamera);
    }

    function updateButtonStates() {
        if (!addCameraBtn || !removeCameraBtn) return;
        addCameraBtn.style.backgroundColor = isAddingCamera ? '#4CAF50' : '';
        removeCameraBtn.style.backgroundColor = isRemovingCamera ? '#f44336' : '';
    }

    function onMapClickAddCamera(e) {
        if (!isAddingCamera) return;
        addCamera(e.lngLat.lat, e.lngLat.lng);
        stopAddingCamera();
    }

    function onMapClickRemoveCamera(e) {
        if (!isRemovingCamera) return;
    }

    /* =========================
       SEARCH & SUGGESTIONS
       ========================= */
    function fetchSuggestions(query) {
        if (!query || query.length < 3) {
            hideSuggestions();
            return;
        }
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&addressdetails=1`;
        fetch(url)
            .then(r => r.json())
            .then(data => {
                currentSuggestions = data;
                showSuggestions(data);
            })
            .catch(err => console.error('Error fetching suggestions:', err));
    }

    function showSuggestions(suggestions) {
        suggestionsContainer.innerHTML = '';
        if (!suggestions || !suggestions.length) {
            hideSuggestions();
            return;
        }
        suggestions.forEach(s => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            const parts = s.display_name.split(',');
            item.innerHTML = `<div class="suggestion-main">${parts[0]}</div><div class="suggestion-details">${parts.slice(1,3).join(',')}</div>`;
            item.addEventListener('click', () => selectSuggestion(s));
            suggestionsContainer.appendChild(item);
        });
        suggestionsContainer.style.display = 'block';
    }

    function hideSuggestions() {
        suggestionsContainer.style.display = 'none';
    }

    function selectSuggestion(s) {
        if (searchInput) searchInput.value = s.display_name.split(',')[0];
        hideSuggestions();
        const lat = parseFloat(s.lat), lon = parseFloat(s.lon);
        map.flyTo({ center: [lon, lat], zoom: 18 }); 
        enterSelectMode();
    }

    function searchLocation() {
        const q = searchInput ? searchInput.value.trim() : '';
        if (!q) return;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`)
            .then(r => r.json())
            .then(data => {
                if (data && data.length) {
                    const res = data[0];
                    map.flyTo({ center: [parseFloat(res.lon), parseFloat(res.lat)], zoom: 17 }); 
                    enterSelectMode();
                }
            })
            .catch(err => console.error('Error searching:', err));
    }

    /* =========================
       SELECTION BOX
       ========================= */
    let selectionBox = null;
    let startPoint = null;

    function startSelectionMode() {
        if (!isSelectMode || isEditMode) return;
        isSelecting = true;
        map.getCanvas().style.cursor = 'crosshair';

        const instruction = document.createElement('div');
        instruction.id = 'selection-instruction';
        instruction.innerText = 'Click and drag to select area to zoom into';
        instruction.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 15px;border-radius:5px;z-index:10000;font-size:14px;';
        document.body.appendChild(instruction);
        setTimeout(() => document.getElementById('selection-instruction')?.remove(), 3000);

        const mc = map.getCanvas();
        mc.addEventListener('mousedown', onMouseDown);
        mc.addEventListener('mousemove', onMouseMove);
        mc.addEventListener('mouseup', onMouseUp);
        map.dragPan.disable();
    }

    function onMouseDown(e) {
        if (e.button !== 0) return;
        startPoint = { x: e.clientX, y: e.clientY };
        selectionBox = document.createElement('div');
        selectionBox.style.cssText = 'position:fixed;border:2px solid #00ff00;background:rgba(0,255,0,0.1);z-index:9998;pointer-events:none;';
        document.body.appendChild(selectionBox);
        e.preventDefault();
    }

    function onMouseMove(e) {
        if (!selectionBox || !startPoint) return;
        const cur = { x: e.clientX, y: e.clientY };
        const left = Math.min(startPoint.x, cur.x), top = Math.min(startPoint.y, cur.y);
        const width = Math.abs(cur.x - startPoint.x), height = Math.abs(cur.y - startPoint.y);
        selectionBox.style.left = left + 'px';
        selectionBox.style.top = top + 'px';
        selectionBox.style.width = width + 'px';
        selectionBox.style.height = height + 'px';
    }

    function onMouseUp(e) {
        if (!selectionBox || !startPoint) return;
        const cur = { x: e.clientX, y: e.clientY };
        const left = Math.min(startPoint.x, cur.x), top = Math.min(startPoint.y, cur.y);
        const right = Math.max(startPoint.x, cur.x), bottom = Math.max(startPoint.y, cur.y);
        const mc = map.getCanvas();
        const rect = mc.getBoundingClientRect();
        
        const topLeftPoint = { x: left - rect.left, y: top - rect.top };
        const bottomRightPoint = { x: right - rect.left, y: bottom - rect.top };
        const topLeft = map.unproject([topLeftPoint.x, topLeftPoint.y]);
        const bottomRight = map.unproject([bottomRightPoint.x, bottomRightPoint.y]);

        if (Math.abs(right - left) > 20 && Math.abs(bottom - top) > 20) {
            map.fitBounds([
                [topLeft.lng, bottomRight.lat],      
                [bottomRight.lng, topLeft.lat]      
            ]);
        }
        endSelectionMode();
    }

    function endSelectionMode() {
        isSelecting = false;
        selectionBox?.remove();
        selectionBox = null;
        document.getElementById('selection-instruction')?.remove();
        map.getCanvas().style.cursor = '';
        const mc = map.getCanvas();
        mc.removeEventListener('mousedown', onMouseDown);
        mc.removeEventListener('mousemove', onMouseMove);
        mc.removeEventListener('mouseup', onMouseUp);
        map.dragPan.enable();
        startPoint = null;
    }

    /* =========================
       EVENT LISTENERS
       ========================= */
    if (searchInput) {
        searchInput.addEventListener('input', function (e) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => fetchSuggestions(e.target.value), 300);
        });

        searchInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                hideSuggestions();
                searchLocation();
            } else if (e.key === 'Escape') {
                hideSuggestions();
                if (isSelectMode) exitSelectMode();
            }
        });

        document.addEventListener('click', function (e) {
            if (!searchInput.contains(e.target) && !suggestionsContainer.contains(e.target)) hideSuggestions();
        });
    }

    // Back button
    if (backBtn) {
        backBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (isEditMode) {
                exitEditMode(); 
            } else if (isSelectMode) {
                exitSelectMode();
            }
        });
    }

    // Edit mode button
    if (editModeBtn) {
        editModeBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (isSelectMode && !isEditMode) enterEditMode();
        });
    }

    // Add/Remove camera buttons (toggle)
    if (addCameraBtn) {
        addCameraBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (!isEditMode) return;
            if (isAddingCamera) stopAddingCamera();
            else {
                if (isRemovingCamera) stopRemovingCamera();
                startAddingCamera();
            }
        });
    }
    if (removeCameraBtn) {
        removeCameraBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (!isEditMode) return;
            if (isRemovingCamera) stopRemovingCamera();
            else {
                if (isAddingCamera) stopAddingCamera();
                startRemovingCamera();
            }
        });
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function (e) {
        if (searchInput?.contains(document.activeElement)) return;
        if (e.key.toLowerCase() === 's' && isSelectMode && !isSelecting && !isEditMode) {
            e.preventDefault(); startSelectionMode();
        }
        if (e.key.toLowerCase() === 'e' && isSelectMode && !isSelecting) {
            e.preventDefault(); isEditMode ? exitEditMode() : enterEditMode();
        }
        if (e.key === 'Escape' && isSelecting) endSelectionMode();
    });

    /* =========================
       INIT
       ========================= */

});
</script>
{% endblock %}
